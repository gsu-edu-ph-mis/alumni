<div id="vModalEditTicket" v-cloak class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel">Ticket Settings</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="col-md-12">
                        <div class="form-group d-flex align-items-center">
                            <label for="priority" class="mr-3 mb-0">Priority</label>
                            <select v-model="priority" id="priority" class="form-control">
                                <option value="0">Regular</option>
                                <option value="1">PWD/Senior/Pregnant</option>
                                <option value="2">High Priority</option>
                            </select>  
                        </div>
                        <div class="form-group d-flex align-items-center">
                            <label for="status" class="mr-3 mb-0">Status</label>
                            <select v-model="status" id="status" class="form-control">
                                <option value="1">Active</option>
                                <option value="2">Hold</option>
                            </select>  
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button :disabled="isNotServiceable" type="button" class="btn btn-success" data-dismiss="modal">Service Now</button>
                <button @click="update(ticket)" type="button" class="btn btn-primary">Update</button>
            </div>
        </div>
    </div>
</div>
