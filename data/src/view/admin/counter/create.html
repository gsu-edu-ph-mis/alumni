{% extends "document.html" %}

{% block body %}
<div class="col-md-12">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <div class="d-flex align-items-start">
            <h1 class="h5 mb-0">Create Counter</h1>
        </div>
        <div class="btn-toolbar mb-2 mb-md-0">
            <div class="btn-group mr-2">
                <a href="/admin/groups/{{group.id}}" class="btn btn-sm btn-outline-primary">Back</a>
            </div>
        </div>
    </div>
    {% include 'parts/flash.html' %}
    <div>
        <ul class="nav nav-tabs">
            <li class="nav-item">
                <a class="nav-link active" href="#" class="d-flex align-items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="19" height="19" viewBox="0 0 24 24"><title>Edit</title><path fill="currentColor" d="M14.06,9L15,9.94L5.92,19H5V18.08L14.06,9M17.66,3C17.41,3 17.15,3.1 16.96,3.29L15.13,5.12L18.88,8.87L20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18.17,3.09 17.92,3 17.66,3M14.06,6.19L3,17.25V21H6.75L17.81,9.94L14.06,6.19Z" /></svg>
                    <span>Details</span>
                </a>
            </li>
        </ul>
    </div>
    <div class="tab-content p-3">
        <form ref="form" id="vApp" v-cloak v-on:submit.prevent="onSubmit" action="/admin/counters" method="POST" class="form-default" novalidate>
            <input type="hidden" name="acsrf" value="{{acsrf}}">
            <div class="form-row">
                <div class="col-md-6">
                    <div class="form-group" :data-error="errors.groupId" @click="errors.groupId=false">
                        <label for="groupId">Group</label>
                        <select v-model="groupId" name="groupId" id="groupId" class="form-control" :disabled="groupName.length>0">
                            <option value=""></option>
                            {% for group in groups %}
                            <option value="{{group.id}}">{{group.name}}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group" :data-error="errors.serviceId" @click="errors.serviceId=false">
                        <label for="serviceId">Select Service</label>
                        <select v-model="serviceId" name="serviceId" id="serviceId" class="form-control">
                            <option value=""></option>
                            {% for service in services %}
                            <option value="{{service.id}}">{{service.name}}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>
            <div class="form-row">
                <div class="col-md-6">
                    <div class="form-group" :data-error="errors.number" @click="errors.number=false">
                        <label for="number">Select Counter #</label>
                        <input v-model="number" name="number" type="number" step="1" min="1" class="form-control" id="number">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group" :data-error="errors.name" @click="errors.name=false">
                        <label for="name">Name</label>
                        <input v-model="name" name="name" type="text" class="form-control" id="name">
                    </div>
                </div>
            </div>
            
            
            <div class="text-center">
                <button class="btn btn-primary d-inline-flex">
                    <svg style="width:22px;height:22px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>Create</title><path fill="currentColor" d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" /></svg>
                    <span>Create</span>    
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
{{ super() }}
<script>
    const groups = {{groups|default([], true)|stringify|safe}}
    const group = {{group|default({}, true)|stringify|safe}}
    const services = {{services|default([], true)|stringify|safe}}
    const suggested = {{suggested}}
    var vApp = new Vue({
        el: '#vApp',
        delimiters: ["${", "}"],
        data: {
            number: '',
            name: '',
            group: group,
            services: services,
            groupId: group?.id,
            serviceId: services.at(0)?.id,
            groupName: '',
            suggested: suggested,
            errors: {
                number: false,
                name: false,
                groupId: false,
            }
        },
        mounted: function(){
            const me = this;
            if(me.suggested) me.number = me.suggested
        },
        methods: {
            onSubmit: function(){
                try {
                    const me = this;

                    Object.keys(this.$data).forEach(key => {
                        if(typeof this[key] === 'string'){
                            this[key] = this[key].trim()
                        }
                    });

                    if(!me.number){
                        me.errors.number = true
                        throw new Error('Number is required.')
                    }
                    if(!me.name){
                        me.errors.name = true
                        throw new Error('Name is required.')
                    }
                    if(!me.groupId){
                        me.errors.groupId = true
                        throw new Error('Group is required.')
                    }
                   
                    me.pending = true;
                    me.$nextTick(function() {
                        me.$refs.form.submit();
                    });
                } catch (err) {
                    alert(err.message)
                }
            }
        }
    });
</script>
{% endblock %}
