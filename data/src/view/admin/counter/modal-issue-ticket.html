<div id="vModalIssueTicket" v-cloak class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel">Issue Ticket Numbers</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="col-md-12 mb-3">
                        <button @click="addToQ(1,5)" type="button" class="btn btn-success">1-5</button>
                        <button @click="addToQ(1,10)" type="button" class="btn btn-success">1-10</button>
                        <button @click="addToQ(1,50)" type="button" class="btn btn-success">1-50</button>
                        <button @click="addToQ(1,100)" type="button" class="btn btn-success">1-100</button>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group d-flex align-items-center">
                            <label for="start" class="mr-1 mb-0">From</label>
                            <input v-model="start" id="start" type="number" step="1" class="form-control">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="form-group d-flex align-items-center">
                            <label for="end" class="mr-1 mb-0">To</label>
                            <input v-model="end" id="end" type="number" step="1" class="form-control">
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <!-- <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button> -->
                <button @click="addToQ(start, end)" type="button" class="btn btn-primary">Add to Q</button>
            </div>
        </div>
    </div>
</div>
