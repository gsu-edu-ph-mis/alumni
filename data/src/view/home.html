{% extends "document-public.html" %}

{% block body %}

<div class="col-sm-6 text-sm-right text-center pt-5 pb-5 order-md-1 order-2">
    <img src="/images/home.png" style="max-width:100%" alt="">
</div>
<div class="col-sm-6 col-md-4 text-white pt-5 order-md-2 order-1">
    <div class="text-center text-md-left pt-sm-5 intro-q">
        <h1 class="h2 mb-4 ml-md-5 pt-md-5 intro-q-title ">Introducing Q</h1>
        <p class="ml-md-5">A better way to queue</p>
        <div class="q-features">
            <ul class="mb-5 text-left ml-md-5">
                <li>No more anxiety waiting.</li>
                <li>No more cutting of lines.</li>
                <li>Avoid the crowd.</li>
            </ul>
        </div>
        <div class="text-center mb-5">
            <a href="/q/me" class="btn btn-light btn-lg">Start Using Q</a>
        </div>
        <div class="text-center mb-3"></div>
        <div class="mt-5">
            <h6 class="text-center h6 mb-3" style="font-weight: 300;">Developed by:</h6>
            <div class="d-flex justify-content-around">
                <div class="text-center position-relative mb-4">
                    <div> 
                        <img class="w-100 mr-3" style="max-width: 150px;" src="/images/ictu-logo-b-alt-horz.png" alt="ICT Unit" title="ICT Unit">
                    
                        <a href="https://www.gsu.edu.ph"><img class="w-100" style="max-width: 40px;" src="/images/logo.png" alt="Guimaras State University" title="Guimaras State University"></a>
                    </div>
                </div>
            </div>
        </div> 
    </div>
</div>

{% endblock %}
